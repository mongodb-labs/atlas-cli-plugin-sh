[package]
name = "atlas-cli-rust-plugin"
version = "1.0.0"
edition = "2021"
repository = "https://github.com/jeroenvervaeke/atlas-cli-rust-plugin"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
dialoguer = "0.12.0"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

