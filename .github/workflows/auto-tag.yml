name: Auto Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compare versions and tag if changed
        run: |
          CURR_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['package']['version'])")
          PREV_VERSION=$(git show HEAD~1:Cargo.toml | python3 -c "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['package']['version'])")

          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"

          if [ "$CURR_VERSION" = "$PREV_VERSION" ]; then
            echo "Version unchanged, skipping tag."
            exit 0
          fi

          TAG="v$CURR_VERSION"

          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged and pushed $TAG"
