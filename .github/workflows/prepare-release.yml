name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0 or 1.0.0-rc3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    steps:
      - name: set Apix Bot token
        id: app-token
        uses: mongodb/apix-action/token@8549161120ce38b1e132ff833302a0ecbde58038
        with:
          app-id: ${{ secrets.APIXBOT_APP_ID }}
          private-key: ${{ secrets.APIXBOT_APP_PEM }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-edit
        run: cargo binstall -y cargo-edit

      - name: Bump version
        env:
          VERSION: ${{ inputs.version }}
        run: cargo set-version "$VERSION"

      - name: Commit and push
        env:
          USER_NAME: ${{ steps.app-token.outputs.user-name }}
          USER_EMAIL: ${{ steps.app-token.outputs.user-email }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "$USER_NAME"
          git config user.email "$USER_EMAIL"
          git checkout -b "release/v$VERSION"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v$VERSION"
          git push origin "release/v$VERSION"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh pr create \
            --title "chore: bump version to v$VERSION" \
            --body "Automated version bump to v$VERSION. Merging this PR will trigger the release workflow." \
            --base main \
            --head "release/v$VERSION"
