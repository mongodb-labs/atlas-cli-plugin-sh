name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0 or 1.0.0-rc3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-edit
        run: cargo binstall -y cargo-edit

      - name: Bump version
        run: cargo set-version ${{ inputs.version }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release/v${{ inputs.version }}
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ inputs.version }}"
          git push origin release/v${{ inputs.version }}

      - name: Open pull request
        run: |
          gh pr create \
            --title "chore: bump version to v${{ inputs.version }}" \
            --body "Automated version bump to v${{ inputs.version }}. Merging this PR will trigger the release workflow." \
            --base main \
            --head release/v${{ inputs.version }}
