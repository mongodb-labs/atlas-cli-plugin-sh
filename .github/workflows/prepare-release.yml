name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0 or 1.0.0-rc3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    steps:
      - name: set Apix Bot token
        id: app-token
        uses: mongodb/apix-action/token@8549161120ce38b1e132ff833302a0ecbde58038
        with:
          app-id: ${{ secrets.APIXBOT_APP_ID }}
          private-key: ${{ secrets.APIXBOT_APP_PEM }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-edit
        run: cargo binstall -y cargo-edit

      - name: Bump version
        run: cargo set-version ${{ inputs.version }}

      - name: Commit and push
        run: |
          git config user.name "${{ steps.app-token.outputs.user-name }}"
          git config user.email "${{ steps.app-token.outputs.user-email }}"
          git checkout -b release/v${{ inputs.version }}
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ inputs.version }}"
          git push origin release/v${{ inputs.version }}

      - name: Open pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --title "chore: bump version to v${{ inputs.version }}" \
            --body "Automated version bump to v${{ inputs.version }}. Merging this PR will trigger the release workflow." \
            --base main \
            --head release/v${{ inputs.version }}
